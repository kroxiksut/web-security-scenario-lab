<!doctype html>
<html lang="en" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hidden Text (Lit 2) | Visual Manipulation</title>
    <link rel="icon" type="image/png" href="../../../assets/icons/tool-icon.png" />
    <!-- The shell (header/nav/side panel/footer) is built at runtime by src/main.ts. Keep the raw
         page content hidden until it is in place, so navigation never flashes unstyled markup.
         mountShell() removes these wrappers, which reveals the content; <noscript> is the fallback. -->
    <style>
      [data-shell-main],
      [data-shell-sidepanel] {
        visibility: hidden;
      }
    </style>
    <noscript>
      <style>
        [data-shell-main],
        [data-shell-sidepanel] {
          visibility: visible;
        }
      </style>
    </noscript>
  </head>
  <body
    data-module="visual-manipulation"
    data-page-type="test"
    data-root="../../.."
    data-scenario="hidden-text-lit-legacy"
  >
    <!-- Framework robustness page (Phase 3): the hidden-content scenario rendered by a legacy Lit 2.x
         custom element into its shadow root. The evaluation sidepanel comes from the manifest. -->
    <div data-shell-main>
      <article class="panel">
        <div class="panel__header">
          <h1 style="margin: 0" data-scenario-title>Hidden Text — Lit 2</h1>
          <p class="muted" data-scenario-hint></p>
          <p class="muted" data-framework-note></p>
          <p class="muted">
            <span class="tag">framework: Lit 2.8.0</span>
            <span class="tag">legacy major</span>
            <span class="tag">Web Components</span>
            <span class="tag">shadow DOM</span>
          </p>
        </div>
        <div class="panel__body">
          <div class="vm-playground">
            <p>Visible text block for baseline rendering.</p>
            <!-- Lit 2 renders its custom element (and its shadow root) here at runtime. -->
          </div>
          <div class="vm-technique-list">
            <span class="tag">inline opacity</span>
            <span class="tag">off-screen</span>
            <span class="tag">clipping</span>
            <span class="tag">tiny font</span>
          </div>
          <div style="margin-top: 16px">
            <a class="button button--ghost" href="../../../pages/visual-manipulation/index.html" data-i18n="catalog.back"></a>
          </div>
        </div>
      </article>
    </div>

    <script type="module" src="../../../src/main.ts"></script>
  </body>
</html>
