<!doctype html>
<html lang="en" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Manipulation | Web Security Scenario Lab</title>
    <link rel="icon" type="image/png" href="../../assets/icons/tool-icon.png" />
    <!-- The shell (header/nav/side panel/footer) is built at runtime by src/main.ts. Keep the raw
         page content hidden until it is in place, so navigation never flashes unstyled markup.
         mountShell() removes these wrappers, which reveals the content; <noscript> is the fallback. -->
    <style>
      [data-shell-main],
      [data-shell-sidepanel] {
        visibility: hidden;
      }
    </style>
    <noscript>
      <style>
        [data-shell-main],
        [data-shell-sidepanel] {
          visibility: visible;
        }
      </style>
    </noscript>
  </head>
  <body data-module="visual-manipulation" data-page="playground" data-page-type="test" data-root="../..">
    <div data-shell-main>
      <article class="panel">
        <div class="panel__header">
          <h1 style="margin: 0" data-i18n="module.visual"></h1>
          <p class="muted" data-i18n="playground.intro"></p>
        </div>
        <div class="panel__body">
          <div data-playground></div>
        </div>
      </article>
    </div>

    <div data-shell-sidepanel>
      <div class="panel__header"><strong data-i18n="playground.answer_key">Answer key</strong></div>
      <div class="panel__body">
        <p class="muted" data-i18n="playground.answer_key.desc"></p>
      </div>
    </div>

    <script type="module" src="../../src/main.ts"></script>
  </body>
</html>
