<!doctype html>
<html lang="en" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hidden Text (Shadow DOM) | Visual Manipulation</title>
    <link rel="icon" type="image/png" href="../../assets/icons/tool-icon.png" />
  </head>
  <body
    data-module="visual-manipulation"
    data-page-type="test"
    data-root="../.."
    data-scenario="hidden-text-shadow-dom"
  >
    <!-- DOM-boundary coverage (Phase 3): hidden content lives inside an open (and nested) shadow
         root. The evaluation sidepanel is rendered from the manifest at runtime. -->
    <div data-shell-main>
      <article class="panel">
        <div class="panel__header">
          <h1 style="margin: 0">Hidden Text — Shadow DOM</h1>
          <p class="muted">
            The suppressed nodes live inside an open shadow root and a nested inner shadow root — a
            detector must traverse <code>element.shadowRoot</code> recursively. Add
            <code>?focus=1</code> for isolated test mode.
          </p>
          <p class="muted">
            <span class="tag">open shadow root</span>
            <span class="tag">nested shadow root</span>
            <span class="tag">encapsulation</span>
          </p>
        </div>
        <div class="panel__body">
          <div class="shadow-host"></div>
          <div style="margin-top: 16px">
            <a class="button button--ghost" href="./index.html">Back to module catalog</a>
          </div>
        </div>
      </article>
    </div>

    <script type="module" src="../../src/main.ts"></script>
  </body>
</html>
