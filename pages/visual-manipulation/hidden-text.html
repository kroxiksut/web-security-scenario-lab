<!doctype html>
<html lang="en" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hidden Text Mixed | Visual Manipulation</title>
    <link rel="icon" type="image/png" href="../../assets/icons/tool-icon.png" />
    <!-- The shell (header/nav/side panel/footer) is built at runtime by src/main.ts. Keep the raw
         page content hidden until it is in place, so navigation never flashes unstyled markup.
         mountShell() removes these wrappers, which reveals the content; <noscript> is the fallback. -->
    <style>
      [data-shell-main],
      [data-shell-sidepanel] {
        visibility: hidden;
      }
    </style>
    <noscript>
      <style>
        [data-shell-main],
        [data-shell-sidepanel] {
          visibility: visible;
        }
      </style>
    </noscript>
  </head>
  <body
    data-module="visual-manipulation"
    data-page-type="test"
    data-root="../.."
    data-scenario="hidden-text-mixed"
  >
    <!-- Scenario content only. The evaluation sidepanel is rendered from the manifest at runtime. -->
    <div data-shell-main>
      <article class="panel">
        <div class="panel__header">
          <h1 style="margin: 0" data-scenario-title>Hidden Text Mixed</h1>
          <p class="muted" data-scenario-hint></p>
        </div>
        <div class="panel__body">
          <div class="vm-playground">
            <p>Visible text block for baseline rendering.</p>
            <p class="vm-hidden-opacity">Hidden by opacity.</p>
            <p class="vm-offscreen">Hidden off-screen node.</p>
            <p class="vm-clipped">Hidden clipped node.</p>
            <div class="vm-overlay-banner">Overlay sample banner with high z-index.</div>
            <div class="vm-zmask"></div>
          </div>
          <div class="vm-technique-list">
            <span class="tag">opacity</span>
            <span class="tag">off-screen</span>
            <span class="tag">clipping</span>
            <span class="tag">z-index</span>
          </div>
          <div style="margin-top: 16px">
            <a class="button button--ghost" href="./index.html" data-i18n="catalog.back"></a>
          </div>
        </div>
      </article>
    </div>

    <script type="module" src="../../src/main.ts"></script>
  </body>
</html>
