<!doctype html>
<html lang="en" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hidden Text Mixed | Visual Manipulation</title>
    <link rel="icon" type="image/png" href="../../assets/icons/tool-icon.png" />
  </head>
  <body
    data-module="visual-manipulation"
    data-page-type="test"
    data-root="../.."
    data-scenario="hidden-text-mixed"
  >
    <!-- Scenario content only. The evaluation sidepanel is rendered from the manifest at runtime. -->
    <div data-shell-main>
      <article class="panel">
        <div class="panel__header">
          <h1 style="margin: 0">Hidden Text Mixed</h1>
          <p class="muted">Add <code>?focus=1</code> to run isolated test mode without menus and side UI.</p>
        </div>
        <div class="panel__body">
          <div class="vm-playground">
            <p>Visible text block for baseline rendering.</p>
            <p class="vm-hidden-opacity">Hidden by opacity.</p>
            <p class="vm-offscreen">Hidden off-screen node.</p>
            <p class="vm-clipped">Hidden clipped node.</p>
            <div class="vm-overlay-banner">Overlay sample banner with high z-index.</div>
            <div class="vm-zmask"></div>
          </div>
          <div class="vm-technique-list">
            <span class="tag">opacity</span>
            <span class="tag">off-screen</span>
            <span class="tag">clipping</span>
            <span class="tag">z-index</span>
          </div>
          <div style="margin-top: 16px">
            <a class="button button--ghost" href="./index.html">Back to module catalog</a>
          </div>
        </div>
      </article>
    </div>

    <script type="module" src="../../src/main.ts"></script>
  </body>
</html>
