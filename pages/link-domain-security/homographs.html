<!doctype html>
<html lang="en" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homographs Rotator | Link Domain Security</title>
    <link rel="icon" type="image/png" href="../../assets/icons/tool-icon.png" />
    <!-- The shell (header/nav/side panel/footer) is built at runtime by src/main.ts. Keep the raw
         page content hidden until it is in place, so navigation never flashes unstyled markup.
         mountShell() removes these wrappers, which reveals the content; <noscript> is the fallback. -->
    <style>
      [data-shell-main],
      [data-shell-sidepanel] {
        visibility: hidden;
      }
    </style>
    <noscript>
      <style>
        [data-shell-main],
        [data-shell-sidepanel] {
          visibility: visible;
        }
      </style>
    </noscript>
  </head>
  <body
    data-module="link-domain-security"
    data-page-type="test"
    data-root="../.."
    data-scenario="homographs-rotator"
  >
    <div data-shell-main>
      <article class="panel">
        <div class="panel__header">
          <h1 style="margin: 0" data-scenario-title>Homographs Rotator</h1>
          <p class="muted" data-scenario-hint></p>
        </div>
        <div class="panel__body">
          <div class="lds-link-grid">
            <!-- The deception lives in the anchor itself: the visible text claims the Latin host,
                 while href carries the lookalike. Reserved .example domain — never resolves. -->
            <article class="lds-link-card lds-link--mismatch">
              <a class="lds-link-target" href="https://truѕted-bank.example">https://trusted-bank.example</a>
              <div class="lds-link-meta">
                <div>
                  <span class="lds-label">visible text</span>
                  <span class="lds-domain">https://trusted-bank.example</span>
                </div>
                <div>
                  <span class="lds-label">actual href</span>
                  <span class="lds-domain lds-domain--mixed-script">https://truѕted-bank.example</span>
                </div>
              </div>
            </article>
            <article class="lds-link-card lds-link--unsafe">
              <a href="javascript:void(0)">https://accounts.example</a>
              <div class="lds-link-meta">
                <div>
                  <span class="lds-label">href</span>
                  <span class="lds-domain lds-protocol--unsafe">javascript:void(0)</span>
                </div>
              </div>
            </article>
            <article class="lds-link-card lds-link--benign">
              <a href="https://portal.example">https://portal.example</a>
              <div class="lds-link-meta">
                <div>
                  <span class="lds-label">href</span>
                  <span class="lds-domain">https://portal.example</span>
                </div>
              </div>
            </article>
          </div>
          <div class="lds-debug"><strong>Debug:</strong> candidate-set=homograph-v1; seed=1042</div>
          <div style="margin-top: 16px">
            <a class="button button--ghost" href="./index.html" data-i18n="catalog.back"></a>
          </div>
        </div>
      </article>
    </div>

    <script type="module" src="../../src/main.ts"></script>
  </body>
</html>
