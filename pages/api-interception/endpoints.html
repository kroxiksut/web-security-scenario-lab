<!doctype html>
<html lang="en" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Interception Attribute Surfaces | API Interception</title>
    <link rel="icon" type="image/png" href="../../assets/icons/tool-icon.png" />
    <!-- The shell (header/nav/side panel/footer) is built at runtime by src/main.ts. Keep the raw
         page content hidden until it is in place, so navigation never flashes unstyled markup.
         mountShell() removes these wrappers, which reveals the content; <noscript> is the fallback. -->
    <style>
      [data-shell-main],
      [data-shell-sidepanel] {
        visibility: hidden;
      }
    </style>
    <noscript>
      <style>
        [data-shell-main],
        [data-shell-sidepanel] {
          visibility: visible;
        }
      </style>
    </noscript>
  </head>
  <body
    data-module="api-interception"
    data-page-type="test"
    data-root="../.."
    data-scenario="api-interception-endpoints"
  >
    <!-- Scenario content only. The evaluation sidepanel is rendered from the manifest at runtime. -->
    <div data-shell-main>
      <article class="panel">
        <div class="panel__header">
          <h1 style="margin: 0" data-scenario-title>API Interception — attribute surfaces</h1>
          <p class="muted" data-scenario-hint></p>
        </div>
        <div class="panel__body">
          <p>Visible baseline paragraph for normal rendering.</p>
          <div class="ai-playground"></div>
          <div style="margin-top: 16px">
            <a class="button button--ghost" href="./index.html" data-i18n="catalog.back"></a>
          </div>
        </div>
      </article>
    </div>

    <script type="module" src="../../src/main.ts"></script>
  </body>
</html>
