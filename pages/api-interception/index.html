<!doctype html>
<html lang="en" data-theme="auto">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Interception | Web Security Scenario Lab</title>
    <link rel="icon" type="image/png" href="../../assets/icons/tool-icon.png" />
    <!-- The shell (header/nav/side panel/footer) is built at runtime by src/main.ts. Keep the raw
         page content hidden until it is in place, so navigation never flashes unstyled markup.
         mountShell() removes these wrappers, which reveals the content; <noscript> is the fallback. -->
    <style>
      [data-shell-main],
      [data-shell-sidepanel] {
        visibility: hidden;
      }
    </style>
    <noscript>
      <style>
        [data-shell-main],
        [data-shell-sidepanel] {
          visibility: visible;
        }
      </style>
    </noscript>
  </head>
  <body data-module="api-interception" data-page="module" data-root="../..">
    <div data-shell-main>
      <article class="panel">
        <div class="panel__header">
          <h1 style="margin: 0" data-i18n="module.api"></h1>
          <p class="muted" data-i18n="module.api.desc"></p>
        </div>
        <div class="panel__body">
          <div data-module-catalog></div>
        </div>
      </article>
    </div>

    <div data-shell-sidepanel>
      <div class="panel__header"><strong data-i18n="evaluation.title">Evaluation Summary</strong></div>
      <div class="panel__body">
        <div class="tag-list">
          <span class="tag">attribute-signal</span>
          <span class="tag">/v1/</span>
          <span class="tag">/graphql</span>
          <span class="tag">mime-signature</span>
          <span class="tag">payload-smuggling</span>
          <span class="tag">ahead-of-detector</span>
          <span class="tag">benign-control</span>
        </div>
      </div>
    </div>

    <script type="module" src="../../src/main.ts"></script>
  </body>
</html>
